<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <form class="form" id="signin">
        <h2>Sign In</h2>

        <label for="emailin">Email</label>
        <input type="text" name="email" id="emailin">

        <label for="passwordin">Password</label>
        <input type="password" name="password" id="passwordin">

        <button>Sign In</button>

        <a href="." onclick="switchForm(event)">Click there if you don`t have account</a>
    </form>

    <form class="form" id="signup" hidden>
        <h2>Sign Up</h2>

        <label for="fullname">Full Name</label>
        <input type="text" name="fullname" id="fullname">

        <label for="emailup">Email</label>
        <input type="text" name="email" id="emailup">

        <label for="passwordup">Password</label>
        <input type="password" name="password" id="passwordup">

        <button>Sign Up</button>

        <a href="." onclick="switchForm(event)">Click here if you have an account</a>
    </form>
</body>

</html>
