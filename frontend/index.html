<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <script src="/frontend/script.js" defer></script>
</head>

<body>
    <main class="auth-page">
        <form class="form" id="signin" onsubmit="handleSignIn(event)" >
            <h2>Sign In</h2>

            <label for="emailin">Email</label>
            <input type="email" name="email" id="emailin" required>

            <label for="passwordin">Password</label>
            <input type="password" name="password" id="passwordin" required>

            <button type="submit">Sign In</button>

            <a href="#" onclick="switchForm(event)">Don&apos;t have an account? Create one.</a>
        </form>

        <form class="form" id="signup" hidden onsubmit="handleSignUp(event)" autocomplete="off">
            <h2>Sign Up</h2>

            <label for="fullname">Full Name</label>
            <input type="text" name="name" id="fullname" required>

            <label for="emailup">Email</label>
            <input type="email" name="email" id="emailup" required>

            <label for="passwordup">Password</label>
            <input type="password" name="password" id="passwordup" required>

            <button type="submit">Sign Up</button>

            <a href="#" onclick="switchForm(event)">Already have an account? Sign in.</a>
        </form>
    </main>
</body>

</html>
